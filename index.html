<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NНафта | АЗС у Локачах</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{font-family:Inter,sans-serif;background:#0b1020;color:#fff;transition:0.3s}
header{position:fixed;top:0;width:100%;background:rgba(11,16,32,.9);backdrop-filter:blur(10px);
display:flex;justify-content:space-between;align-items:center;padding:15px 40px;z-index:10}
.logo{font-size:26px;font-weight:800;color:#22c55e}
nav a{color:#e5e7eb;margin-left:20px;text-decoration:none;font-weight:600}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
padding:40px;background:linear-gradient(135deg,#0b1020,#111827,#14532d)}
.hero h1{font-size:52px;margin-bottom:15px}
.hero p{color:#cbd5e1;font-size:18px;margin-bottom:20px}
.btn{background:#22c55e;color:#04110a;padding:14px 24px;border-radius:14px;
text-decoration:none;font-weight:700;display:inline-block;cursor:pointer}
section{padding:100px 40px}
.container{max-width:1100px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.card{background:#111827;padding:20px;border-radius:18px;opacity:0;transform:translateY(30px);
transition:0.6s}
.card.show{opacity:1;transform:translateY(0)}
h2{font-size:36px;margin-bottom:20px}
.muted{color:#94a3b8}
input,select{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1f2937;color:white}
footer{text-align:center;padding:30px;color:#94a3b8;border-top:1px solid #1f2937}
.light{background:#f5f5f5;color:#111}
.light header{background:white}
.light .card{background:white;color:black}
.light input,.light select{background:#e5e5e5;color:black}
.counter{font-size:32px;font-weight:800;color:#22c55e}
</style>
</head>

<body>

<header>
<div class="logo">NНафта</div>
<nav>
<a href="#about">Про нас</a>
<a href="#services">Послуги</a>
<a href="#order">Замовлення</a>
<a href="#map">Карта</a>
</nav>
<button class="btn" onclick="toggleTheme()">Тема</button>
</header>

<section class="hero">
<div>
<h1>Якісне паливо в Локачах</h1>
<p>Швидка заправка, доставка та корпоративні рішення</p>
<a class="btn" href="#order">Замовити</a>
<div class="counter" id="counter">0+</div>
<p class="muted">Клієнтів</p>
</div>
</section>

<section id="services">
<div class="container">
<h2>Наші переваги</h2>
<div class="grid">
<div class="card">Якість пального</div>
<div class="card">Швидка доставка</div>
<div class="card">Для бізнесу</div>
<div class="card">24/7 робота</div>
</div>
</div>
</section>

<section id="order">
<div class="container">
<h2>Замовлення палива</h2>
<form onsubmit="order(event)">
<select>
<option>А-95</option>
<option>Дизель</option>
<option>Газ</option>
</select>
<input type="number" id="liters" placeholder="Кількість літрів">
<input type="text" placeholder="Адреса">
<input type="tel" placeholder="Телефон">
<button class="btn" type="submit">Оформити</button>
</form>

<h3 style="margin-top:20px">Вартість: <span id="price">0</span> грн</h3>
</div>
</section>

<section id="map">
<div class="container">
<h2>Локація</h2>
<iframe src="https://maps.google.com/maps?q=Lokachi%20Ukraine&output=embed"
width="100%" height="400"></iframe>
</div>
</section>

<footer>
© 2026 NНафта | Створено Кириловом Назаром
</footer>

<script>
// animate cards
const cards = document.querySelectorAll('.card');
const obs = new IntersectionObserver(e=>{
e.forEach(el=>{if(el.isIntersecting) el.target.classList.add('show')})
});
cards.forEach(c=>obs.observe(c));

// calculator
document.getElementById("liters").addEventListener("input",function(){
let pricePerLitre = 58;
document.getElementById("price").innerText = this.value * pricePerLitre || 0;
});

// form
function order(e){
e.preventDefault();
alert("Замовлення прийнято! Ми скоро зв’яжемося з вами.");
}

// theme
function toggleTheme(){
document.body.classList.toggle("light");
}

// counter
let count = 0;
setInterval(()=>{
if(count < 5000){
count += 50;
document.getElementById("counter").innerText = count + "+";
}
},30);
</script>

</body>
</html>
